<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>SSPI Dashboard v4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
                .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 8px; margin-bottom: 30px; }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { font-size: 1.1em; opacity: 0.9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h3 { color: #667eea; margin-bottom: 15px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; }
        .card .value { font-size: 2.5em; font-weight: bold; color: #333; }
        .card .change { font-size: 0.9em; margin-top: 10px; color: #666; }
        .chart { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .loading { text-align: center; padding: 40px; color: #999; }
        .error { background: #fee; color: #c33; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
                  .success { background: #efe; color: #3c3; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
                  table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f9f9f9; font-weight: 600; color: #667eea; }
    </style>
          </head>
      <body>
    <div class="container">
              <header>
                  <h1>SSPI Dashboard v4</h1>
            <p class="subtitle">Store & Sales Performance Intelligence</p>
                  </header>

        <div id="status"></div>

        <div class="grid">
            <div class="card">
                          <h3>Total Stores</h3>
                          <div class="value" id="storeCount">-</div>
                          <div class="change">Active locations</div>
            </div>
                      <div class="card">
                          <h3>Total Inventory</h3>
                          <div class="value" id="invCount">-</div>
                <div class="change">Items in stock</div>
            </div>
            <div class="card">
                <h3>Total Sales</h3>
                <div class="value" id="salesCount">-</div>
                <div class="change">Transactions</div>
            </div>
            <div class="card">
                <h3>Avg Transaction</h3>
                <div class="value" id="avgSale">-</div>
                <div class="change">Per sale</div>
            </div>
        </div>

        <div class="chart">
            <h2>Top Stores by Sales</h2>
            <table id="storesTable">
                <thead>
                    <tr>
                        <th>Store</th>
                        <th>Location</th>
                        <th>Manager</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="4" class="loading">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // SSPI Backend Configuration
        const SHEET_ID = '1LTA2g2pZsXYC-uDBDyrnXWaBMuClet63zy8ivsSnaJA'; // Replace with your Google Sheet ID
        const GSHEET_API_KEY = 'AIzaSyBQrEt7J3nuuCm_iaoGLtfLPcqxyT9uSno'; // Replace with your Google API Key

                  async function loadDashboardData() {
                      try {
                const status = document.getElementById('status');

                if (SHEET_ID === '1LTA2g2pZsXYC-uDBDyrnXWaBMuClet63zy8ivsSnaJA') {
                    status.innerHTML = '<div class="error">Dashboard is configured but needs Google Sheets credentials. See setup instructions below.</div>';
                    showInstructions();
                    return;
                }

                status.innerHTML = '<div class="success">Dashboard connected to Google Sheets backend!</div>';

                // Fetch from Stores sheet
                const storesData = await fetchSheetData('Stores');
                updateStoresMetrics(storesData);

                // Fetch from Inventory sheet
                const invData = await fetchSheetData('Inventory');
                updateInventoryMetrics(invData);

                // Fetch from Sales sheet
                const salesData = await fetchSheetData('Sales');
                updateSalesMetrics(salesData);
                      } catch (err) {
                console.error('Error loading dashboard:', err);
                document.getElementById('status').innerHTML = '<div class="error">Error loading data: ' + err.message + '</div>';
                      }
                  }

        async function fetchSheetData(sheetName) {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${sheetName}?key=${GSHEET_API_KEY}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`Failed to fetch ${sheetName}`);
            return response.json();
        }

        function updateStoresMetrics(data) {
                      const rows = data.values || [];
            document.getElementById('storeCount').textContent = Math.max(0, rows.length - 1);

            if (rows.length > 1) {
                const tbody = document.querySelector('#storesTable tbody');
                tbody.innerHTML = '';
                                  for (let i = 1; i < Math.min(6, rows.length); i++) {
                    const row = rows[i];
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${row[1] || '-'}</td><td>${row[2] || '-'}</td><td>${row[3] || '-'}</td><td>${row[7] || '-'}</td>`;
                    tbody.appendChild(tr);
                                  }
            }
        }

        function updateInventoryMetrics(data) {
                      const rows = data.values || [];
            document.getElementById('invCount').textContent = Math.max(0, rows.length - 1);
        }

        function updateSalesMetrics(data) {
                      const rows = data.values || [];
            document.getElementById('salesCount').textContent = Math.max(0, rows.length - 1);

            if (rows.length > 1) {
                let total = 0;
                for (let i = 1; i < rows.length; i++) {
                    total += parseFloat(rows[i][5] || 0);
                }
                const avg = rows.length > 1 ? (total / (rows.length - 1)).toFixed(2) : 0;
                document.getElementById('avgSale').textContent = '$' + avg;
            }
        }

        function showInstructions() {
                      const status = document.getElementById('status');
            status.innerHTML += `<div style="margin-top: 20px; background: #f0f0f0; padding: 20px; border-radius: 8px;">
                              <h3>Setup Instructions:</h3>
                              <p>1. Get your Google Sheet ID from: <code style="background: white; padding: 2px 6px; border-radius: 3px;">SSPI_BACKEND_V2</code></p>
                              <p>2. Enable Google Sheets API and get an API Key from Google Cloud Console</p>
                              <p>3. Update SHEET_ID and GSHEET_API_KEY in the JavaScript section above</p>
                              <p>4. Redeploy the dashboard</p>
            </div>`;
        }

        // Load data on page load
        window.addEventListener('load', loadDashboardData);
    </script>
      </body>
      </html>
